services:
  mc:
    image: itzg/minecraft-server:multiarch
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "MODRINTH"
      MODRINTH_MODPACK: "https://modrinth.com/modpack/homestead"
      MODRINTH_DEFAULT_VERSION_TYPE: "release"
      MEMORY: "7168M"
      MOTD: "Homestead - Time to get cosy."
      ENABLE_COMMAND_BLOCK: "true"
      SIMULATION_DISTANCE: "8"
      VIEW_DISTANCE: "8"
      SEED: "butts"
      LEVEL: "hs_catbug"
      OPS: |-
        UncleCeiling
        proXfizzy
      ALLOW_FLIGHT: "true"
    volumes:
      - "./data:/data"
    restart: always
